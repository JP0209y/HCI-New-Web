<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Enquire Now</title>
    <meta name="description" content="" >
    <meta name="keywords" content="" >

    <!-- PNG Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    >

    <!-- Apple iPhone -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    >

    <!-- Android / PWA -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    >

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    >

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- ================================
     ICON LIBRARIES
================================ -->

    <!-- Google Material Symbols (for icons like wishlist, compare, search) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"
    >

    <!-- Font Awesome (for star ratings, extra icons, UI elements) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

   
 <!-- Base / Global Style -->
    <link rel="stylesheet" href="css/hci-style.css" >

   

    <!-- Components / Sections -->
    <link rel="stylesheet" href="css/shop.css" >
    <link rel="stylesheet" href="css/product-ecom.css" > 
    <link rel="stylesheet" href="css/product-detail.css" >

    <!-- Responsive (Always Last) -->
    <link rel="stylesheet" href="css/responsive-style.css" >

  

<!-- intl-tel-input CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" >




  <body class="m-4">



          <!-- Product Enquiry Button -->
       <button class="expert-btn expert-btn-enquire"  data-bs-toggle="modal"
   data-bs-target="#enquiryModal">
        <i class="fa-regular fa-envelope"></i> Enquire Now
      </button>


    <!-- Enquiry Form Modal -->
    <div class="modal fade" id="enquiryModal" tabindex="-1" aria-hidden="true">
      <div
        class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable"
      >
        <div
          class="modal-content border-0 rounded-4 overflow-hidden position-relative"
        >
          <!-- Close Button -->
          <button
            type="button"
            class="btn-close position-absolute top-0 end-0 m-3 z-3"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>

          <div class="modal-body p-0">
            <div class="row g-0">
              <!-- Left Side -->
              <div class="col-lg-6 d-none d-lg-block">
                <img
                  src="images/enquiry-bg.webp"
                  class="w-100 h-100 object-fit-cover d-block"
                  alt="Rotai Banner"
                />
              </div>

              <!-- Right Side -->
              <div class="col-lg-6 bg-white p-4">
                <h2>Make an Enquiry</h2>

                <p class="text-muted mb-4">
                  Fill in your details and our team will connect with you
                  shortly.
                </p>

                <!-- Form -->
                <form id="popupForm">
                  <!-- Full Name -->
                  <div class="form-group mb-3">
                    <label for="name" class="form-label">
                      Full Name <span class="text-danger">*</span>
                    </label>

                    <input
                      type="text"
                      name="name"
                      id="name"
                      class="form-control"
                      placeholder="Enter Full Name"
                      required
                    />
                  </div>

                  <!-- Email -->
                  <div class="form-group mb-3">
                    <label for="email" class="form-label">
                      Email Address <span class="text-danger">*</span>
                    </label>

                    <input
                      type="email"
                      name="email"
                      id="email"
                      class="form-control"
                      placeholder="Enter Email Address"
                      required
                    />
                  </div>





                  <!-- Phone -->
                  <div class="form-group mb-3">
                    <label for="phone" class="form-label">
                      Phone No. <span class="text-danger">*</span>
                    </label>

                     <input type="tel" id="phone" name="phone" class="form-control" placeholder="Phone Number" required aria-label="Phone Number" pattern="[0-9]{10}" maxlength="14" required>


                  </div>

                  <!-- Product -->
                  <div class="form-group mb-4">
                    <label for="product" class="form-label"> Product </label>

                    <input
                      type="text"
                      name="product"
                      id="product"
                      class="form-control bg-light"
                      value="Rotai R-AUREX"
                      readonly
                    />
                  </div>

                  <!-- Submit -->
                  <button type="submit" class="btn btn-primary w-100 ">
                    Submit <i class="material-symbols-outlined ms-2">send</i>
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

   

    <!-- Bootstrap Bundle JS (Includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

     <!-- intl-tel-input JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

    <!-- utils script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>

       <script>const input = document.querySelector("#phone");

        const iti = window.intlTelInput(input, {
            initialCountry: "in", // India default
            separateDialCode: true,
            preferredCountries: ["in", "us", "gb"],
        });

        // Form submit
        document.getElementById("contactForm").addEventListener("submit", function (e) {
            e.preventDefault();

            if (!iti.isValidNumber()) {
                alert("Please enter a valid mobile number");
                return;
            }

            const fullNumber = iti.getNumber();

            console.log("Full Number:", fullNumber);

            alert("Submitted Number: " + fullNumber);
        });</script>




  </body>
</html>
