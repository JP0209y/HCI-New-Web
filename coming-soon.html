<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Coming Soon</title>
    <meta name="description" content="" >
    <meta name="keywords" content="" >

    <!-- PNG Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    >

    <!-- Apple iPhone -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    >

    <!-- Android / PWA -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    >

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    >

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- ================================
     ICON LIBRARIES
================================ -->

    <!-- Google Material Symbols (for icons like wishlist, compare, search) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"
    >

   

  


    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    >
  </head>

  <body>
    <div
      style="
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f6f5f1;
        position: relative;
        overflow: hidden;
      "
    >
      <!-- BACKGROUND SHAPES -->
      <div
        style="
          position: absolute;
          width: 500px;
          height: 500px;
          border-radius: 50%;
          background: #3f4f44;
          opacity: 0.06;
          top: -180px;
          right: -150px;
        "
      ></div>
      <div
        style="
          position: absolute;
          width: 300px;
          height: 300px;
          border-radius: 50%;
          background: #3f4f44;
          opacity: 0.05;
          bottom: -100px;
          left: -100px;
        "
      ></div>

      <!-- HEADER -->
      <div
        style="
          padding: 20px 20px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          position: relative;
          z-index: 2;
        "
      >
        <div style="display: flex; align-items: center; gap: 10px">
          <img src="images/hci-logo.webp" style="height: 40px" >
        </div>

        
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"
/>


<div
  style="
    padding: 9px 16px;
    border-radius: 50px;
    border: 1px solid #e2e0d8;
    background: #fff;
    text-decoration: none;
    color: #3f4f44;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    line-height: 1;
  "
>
  <span
    class="material-symbols-outlined"
    style="font-size: 18px; line-height: 1; color: red;"
  >
    call
  </span>
  +91 73000 00739
</div>


      </div>

      <!-- MAIN -->
      <div
        style="
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          text-align: center;
          padding: 40px 20px;
          position: relative;
          z-index: 2;
        "
      >
        <!-- BADGE -->
        <div
          style="
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #d74f0e15;
            border: 1px solid rgba(215, 79, 14, 0.2);
            padding: 7px 14px;
            border-radius: 50px;
            font-size: 12px;
            color: #d74f0e;
            margin-bottom: 22px;
          "
        >
          <span
            style="
              width: 6px;
              height: 6px;
              border-radius: 50%;
              background: #d74f0e;
              animation: pulse 1.5s infinite;
            "
          ></span>
          Something exciting is coming
        </div>

        <!-- TITLE -->
        <h1
          style="
            font-size: 42px;
            font-weight: 600;
            color: #3f4f44;
            max-width: 620px;
            line-height: 1.2;
            margin: 0 0 12px;
          "
        >
          We're crafting your
          <span style="color: #d74f0e">next level of relaxation</span>
        </h1>

        <p
          style="
            font-size: 14px;
            color: #555;
            max-width: 500px;
            line-height: 1.6;
            margin: 0 0 32px;
          "
        >
          Our new product line is almost ready. Be the first to experience
          premium massage chairs designed for ultimate comfort.
        </p>

      

       


     <button 
  onclick="window.location.href='index.html'"
  style="
    max-width:320px;
    width:100%;
    background: #d74f0e;
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 15px 24px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.3s ease;
    font-family: 'Red Hat Display', sans-serif;
  "
  onmouseover="this.style.transform='translateY(-2px)'; this.style.opacity='0.9'"
  onmouseout="this.style.transform='translateY(0)'; this.style.opacity='1'"
>
  <span class="material-symbols-outlined" style="font-size:18px;">
    arrow_back
  </span>
  Back To Home
</button>

        <!-- SUCCESS -->
        <div
          id="success"
          style="
            display: none;
            align-items: center;
            gap: 6px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 13px;
          "
        >
          ✔ You're on the list!
        </div>
      </div>
    </div>

    <!-- ANIMATION -->
    <style>
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.7);
          opacity: 0.4;
        }
      }
    </style>

   
  </body>
</html>
