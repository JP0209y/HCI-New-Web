    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >

  <!-- Base / Global Style -->

<!-- Layout (Header & Footer) -->
<link rel="stylesheet" href="css/header.css" >
<link rel="stylesheet" href="css/footer.css" >

<!-- Components / Sections -->
<link rel="stylesheet" href="css/shop.css" >
<link rel="stylesheet" href="css/product-ecom.css" > 
<link rel="stylesheet" href="css/product-detail.css" >

<!-- Responsive (Always Last) -->

      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    >

  <body class="lg-bg">
    <!-- ===== MAIN CONTENT ===== -->

    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo">
          <img src="images/hci-logo.webp" alt="HCI Logo" >
        </div>

        <h4 class="login-title">Welcome Back</h4>
        <p class="text-center mb-4 text-muted">Please login to your account</p>

        <form>
          <div class="mb-3 login-input-group">
            <input
              type="email"
              class="form-control"
              value="hcijaipal@gmail.com"
            >
            <i class="fa fa-envelope input-icon"></i>
          </div>

          <div class="mb-3 login-input-group">
            <input type="password" class="form-control" value="password123" >
            <i class="fa fa-lock input-icon"></i>
          </div>

          <div class="d-flex justify-content-between mb-3 form-link">
            <label><input type="checkbox" > Remember me</label>
            <a href="forgot.html">Forgot password?</a>
          </div>

          <a href="my-account.html" class="btn btn-primary w-100">Login</a>

          <div class="divider">Or Register with</div>

          <div class="social-login">
            <button class="btn btn-outline-primary">
              <i class="fab fa-google me-2"></i> Continue with Google
            </button>
          </div>

          <p class="mb-0 text-center form-link">
            Don't have an account? <a href="register.html">Register</a>
          </p>
        </form>
      </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->

    <!-- Bootstrap Bundle JS (Includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
