<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Register - Relax & Recharge</title>
    <meta name="description" content="" >
    <meta name="keywords" content="" >

    <!-- PNG Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    >

    <!-- Apple iPhone -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    >

    <!-- Android / PWA -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    >

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    >

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- ================================
     ICON LIBRARIES
================================ -->

    <!-- Google Material Symbols (for icons like wishlist, compare, search) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"
    >

    <!-- Font Awesome (for star ratings, extra icons, UI elements) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

   <!-- Base / Global Style -->
<link rel="stylesheet" href="css/hci-style.css" >


<!-- Components / Sections -->
<link rel="stylesheet" href="css/shop.css" >
<link rel="stylesheet" href="css/product-ecom.css" > 
<link rel="stylesheet" href="css/product-detail.css" >

<!-- Responsive (Always Last) -->
<link rel="stylesheet" href="css/responsive-style.css" >

  
  </head>

  <body class="lg-bg">
    
    <!-- ===== MAIN CONTENT ===== -->

    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo">
          <img src="images/hci-logo.webp" alt="HCI Logo" >
        </div>

        <h4 class="login-title">Register Your Account</h4>
        <p class="text-center mb-4 text-muted">
          Create your account to get started
        </p>

        <form>
          <!-- Email -->
          <div class="mb-3 login-input-group">
            <input
              type="email"
              class="form-control"
              placeholder="Email address"
            >
            <i class="fa fa-envelope input-icon"></i>
          </div>

          <!-- Password -->
          <div class="mb-3 login-input-group">
            <input
              type="password"
              class="form-control"
              placeholder="Password"
            >
            <i class="fa fa-lock input-icon"></i>
          </div>

          <!-- Confirm Password -->
          <div class="mb-3 login-input-group">
            <input
              type="password"
              class="form-control"
              placeholder="Password (again)"
            >
            <i class="fa fa-lock input-icon"></i>
          </div>

          <!-- Button -->
          <a href="login.html" class="btn btn-primary w-100">Register</a>

          <!-- Divider -->
          <div class="divider">Or Register with</div>

          <!-- Social -->
          <div class="social-login">
            <button class="btn btn-outline-primary w-100">
              <i class="fab fa-google me-2"></i> Continue with Google
            </button>
          </div>

          <!-- Login Link -->
          <p class="mb-0 text-center form-link mt-3">
            Already have an account? <a href="login.html">Login</a>
          </p>
        </form>
      </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->

    <!-- Bootstrap Bundle JS (Includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
