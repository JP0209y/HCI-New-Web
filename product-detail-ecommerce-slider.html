<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Product Detail Ecommerce Slider</title>
    <meta name="description" content="" >
    <meta name="keywords" content="" >

    <!-- PNG Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    >

    <!-- Apple iPhone -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    >

    <!-- Android / PWA -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    >

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" >
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    >

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    >

    <!-- Google Material Symbols (for icons like wishlist, compare, search) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"
    >

    <!-- Font Awesome (for star ratings, extra icons, UI elements) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

    <!-- Base / Global Style -->
    <link rel="stylesheet" href="css/hci-style.css" >



    <!-- Components / Sections -->
    <link rel="stylesheet" href="css/shop.css" >
    <link rel="stylesheet" href="css/product-ecom.css" >
    <link rel="stylesheet" href="css/product-detail.css" >

    <!-- Responsive (Always Last) -->
    <link rel="stylesheet" href="css/responsive-style.css" >


  </head>

  <body>
   
    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-container">
      <!-- Product Detail Section -->

      <section>
        <div class="container">
          <div class="row">
            <!-- LEFT PRODUCT VIEW -->
            
            <div class="col-md-6">
    <div class="pos-sticky">
    <div class="zoom-container page-zoom">
    <img class="mainImage-page" src="" alt="Product" >
    <button class="expand-btn page-expand-btn" title="Full screen">
    <i class="material-symbols-outlined">fullscreen</i>
    </button>
    </div>

    <div class="thumb-wrapper">
    <button class="thumb-arrow page-prev">&#10094;</button>
    <div class="thumbnails-page"></div>
    <button class="thumb-arrow page-next">&#10095;</button>
    </div>
    </div>

    <!-- PAGE LIGHTBOX -->
    <div class="lightbox-overlay page-lightbox">
    <button class="lightbox-close page-lb-close">&#10005;</button>
    <span class="lightbox-counter page-lb-counter"></span>
    <div class="lightbox-main">
    <button class="lb-arrow lb-left page-lb-prev">&#10094;</button>
    <img
    class="lightbox-img page-lb-image"
    src=""
    alt="Full view"
    >
    <button class="lb-arrow lb-right page-lb-next">&#10095;</button>
    </div>
    <div class="lb-thumbs page-lb-thumbs"></div>
    </div>
    </div>

            <!-- RIGHT VARIANTS -->
            <div class="col-md-6">
            
  <div class="variants">
    <span class="variants-label">Color</span>
    <div
    class="color-circle page-circle active"
    style="background: #808080"
    onclick="loadSet('col-1', this, 'page')"
    title="Grey"
    ></div>
    <div
    class="color-circle page-circle"
    style="background: #e9c4bc"
    onclick="loadSet('col-2', this, 'page')"
    title="Pink Brown"
    ></div>
    <div
    class="color-circle page-circle"
    style="background: #5c4033"
    onclick="loadSet('col-3', this, 'page')"
    title="Dark Brown"
    ></div>
    </div>

            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- ===== JAVASCRIPT ===== -->

    <!-- Bootstrap Bundle JS (Includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

   
    <!-- Product Ecommerce slider  JS -->
    <script src="js/ecommerceslider.js"></script>

  </body>
</html>
